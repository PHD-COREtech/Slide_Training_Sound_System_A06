<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Liệu Đào Tạo Vận Hành Hệ Thống Âm Thanh Hội Trường - AVI JSC</title>
    <style>
        :root {
            /* Tông màu nhận diện chuẩn AVI JSC theo Website */
            --primary-color: #39B54A; /* Xanh lá tươi sáng chính thống của AVI */
            --primary-hover: #2d8f3a; 
            --bg-color: #F8F9FA;
            --text-color: #333333;
            --slide-bg: #FFFFFF;
            
            /* Màu chức năng bổ trợ */
            --dark-gray: #4A4A4A;
            --warning-color: #FF9800; /* Màu cam cho cảnh báo vừa */
            --danger-color: #E32228; /* Màu đỏ cho cảnh báo nghiêm trọng */
            --accent-blue: #007BFF;
        }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #222; height: 100%; overflow: hidden; }
        .slider-container { width: 100%; max-width: 1366px; height: 768px; margin: 15px auto; position: relative; background: var(--slide-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; border-radius: 8px; }
        
        /* Header & Footer chuẩn nhận diện thương hiệu AVI Integration */
        .header { background-color: #FFFFFF; color: var(--text-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; height: 80px; box-sizing: border-box; border-bottom: 4px solid var(--primary-color); }
        .header h1 { font-size: 19px; margin: 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dark-gray); }
        
        /* Logo đính kèm từ người dùng */
        .logo-container img { height: 45px; object-fit: contain; }
        
        .footer { background-color: var(--primary-color); color: white; height: 35px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; font-size: 14px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; font-weight: 600; z-index: 50; }
        
        /* Slides */
        .slides-wrapper { flex: 1; position: relative; width: 100%; height: calc(100% - 115px); overflow: hidden; background-image: radial-gradient(circle at top right, #f4fff6, #ffffff); }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px 40px 80px 40px; box-sizing: border-box; opacity: 0; transition: opacity 0.4s ease-in-out; display: none; overflow-y: auto; }
        .slide.active { opacity: 1; display: block; z-index: 10; }
        
        /* Custom Scrollbar */
        .slide::-webkit-scrollbar { width: 8px; }
        .slide::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .slide::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .slide::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }
        
        /* Content Typography */
        h2 { color: var(--dark-gray); border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; margin-top: 0; font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        h3 { color: var(--primary-color); font-size: 22px; margin-top: 0; margin-bottom: 12px; font-weight: 700; }
        p, li { font-size: 16px; line-height: 1.6; color: var(--text-color); }
        ul { margin-bottom: 15px; }
        strong { color: #111; }
        
        /* Grid Layouts for Equipment */
        .equipment-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 25px; align-items: start; margin-top: 20px; }
        .img-placeholder { background-color: #F8F9FA; border: 2px dashed var(--primary-color); border-radius: 8px; height: 220px; display: flex; align-items: center; justify-content: center; color: var(--primary-hover); font-weight: bold; text-align: center; padding: 20px; box-shadow: inset 0 0 10px rgba(57, 181, 74, 0.05); font-size: 14px; }
        .specs-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .specs-table th, .specs-table td { border: 1px solid #DEE2E6; padding: 10px 12px; text-align: left; font-size: 15px; vertical-align: top; }
        .specs-table th { background-color: var(--primary-color); color: white; font-weight: 600; }
        .specs-table tr:nth-child(even) { background-color: #FAFDFA; }
        
        /* Signal Flow Diagram */
        .flow-container { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding: 25px; background: white; border: 1px solid #EAEAEA; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-wrap: wrap; gap: 10px; }
        
        .flow-box { 
            background: white; 
            color: var(--text-color); 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            width: 160px; 
            font-weight: bold; 
            border: 2px solid var(--primary-color); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            position: relative; 
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease; 
        }
        .flow-box:hover { 
            transform: translateY(-8px) scale(1.03); 
            box-shadow: 0 12px 20px rgba(57, 181, 74, 0.25); 
            border-color: var(--primary-hover);
        }
        .flow-box .icon { font-size: 30px; margin-bottom: 8px; display: block; }
        .flow-arrow { font-size: 28px; color: var(--primary-color); font-weight: bold; text-align: center; }
        .protocol-tag { font-size: 11px; color: #333; background: #e8f5e9; padding: 3px 6px; border-radius: 4px; display: inline-block; margin-top: 5px; border: 1px solid var(--primary-color); }
        
        /* ===== Signal Flow Branch Layout (Slide 3 Only) ===== */
        .flow-container-branch{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-top:40px;
            padding:25px;
            background:#fff;
            border:1px solid #EAEAEA;
            border-radius:8px;
            box-shadow:0 4px 15px rgba(0,0,0,.05);
            gap:12px;
        }

        .flow-node{
            background:#fff;
            border:2px solid var(--primary-color);
            border-radius:8px;
            width:155px;                
            height:145px;               
            padding:10px;               
            text-align:center;
            font-weight:bold;
            box-shadow:0 4px 6px rgba(0,0,0,.05);
            box-sizing:border-box;      
            display:flex;               
            flex-direction:column;
            justify-content:center;     
            align-items:center;         
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .flow-node:hover {
            transform: translateY(-8px) scale(1.03); 
            box-shadow: 0 12px 20px rgba(57, 181, 74, 0.25);
            border-color: var(--primary-hover);
        }

        @keyframes clickBounce {
            0% { transform: scale(1); }
            30% { transform: scale(0.9) translateY(4px); }
            55% { transform: scale(1.08) translateY(-12px); }
            100% { transform: scale(1) translateY(0); }
        }
        .clicked-bounce {
            animation: clickBounce 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        .flow-node .icon{
            display:block;
            font-size:30px;             
            margin-bottom:8px;
        }

        .flow-branch{
            display:flex;
            flex-direction:column;
            justify-content:center;
            gap:18px;
        }

        .flow-line{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .flow-arrow{
            font-size:28px;
            color:var(--primary-color);
            font-weight:bold;
            text-align:center;
            width:105px;                
            flex-shrink: 0;             
            box-sizing: border-box;
        }
        
        /* Controls */
        .controls { position: absolute; bottom: 45px; right: 30px; z-index: 20; display: flex; gap: 10px; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 6px; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 8px 18px; font-size: 15px; cursor: pointer; border-radius: 4px; font-weight: bold; box-shadow: 0 2px 6px rgba(57, 181, 74, 0.3); transition: all 0.2s; }
        .btn:hover { background-color: var(--primary-hover); transform: scale(1.05); }
        
        /* Tags */
        .trouble-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .tag-red { background-color: #ffeaea; color: var(--danger-color); border: 1px solid var(--danger-color); }
        .tag-orange { background-color: #fff3e0; color: var(--warning-color); border: 1px solid var(--warning-color); }
        .tag-blue { background-color: #e3f2fd; color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        
        /* Callout Box */
        .callout { background-color: #e8f5e9; border-left: 5px solid var(--primary-color); padding: 15px; margin: 15px 0; border-radius: 0 4px 4px 0; }
        .callout-title { font-weight: bold; color: var(--primary-hover); margin-bottom: 5px; font-size: 16px; }
    </style>

<style id="v2-mobile-enhancements">
/* ==========================================================================
   XỬ LÝ TRIỆT ĐỂ: Tự động hóa layout hình ảnh & bảng thông số cho TẤT CẢ các slide sản phẩm
   ========================================================================== */

/* 1. Ép lưới thiết bị luôn chia đúng tỷ lệ và không bị phá vỡ layout */
.equipment-grid {
    display: grid !important;
    grid-template-columns: 320px 1fr !important; /* Cố định cột ảnh 320px, cột nội dung tự động chiếm phần còn lại */
    gap: 30px !important;
    align-items: start !important;
    margin-top: 20px !important;
}

/* 2. Chuẩn hóa khung chứa ảnh (Tránh việc thiếu/thừa thẻ div làm hỏng giao diện) */
.product-visual {
    width: 320px !important;
    height: 240px !important; /* Khóa khung hình chữ nhật chuẩn cho ảnh sản phẩm */
    padding: 8px !important;
    background: #ffffff !important;
    border: 2px dashed var(--primary-color) !important;
    border-radius: 8px !important;
    box-sizing: border-box !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
}

/* 3. Ép ảnh sản phẩm tự động Fit khít theo khung, không bị móp méo hay tràn viền */
.product-visual img {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important; /* Giữ nguyên tỷ lệ gốc của ảnh */
    max-height: 220px !important;
    display: block !important;
}

/* 4. Tiện ích Fullscreen nút bấm */
.v2-fullscreen { 
    position: absolute; top: 88px; right: 18px; z-index: 60; border: 0; 
    border-radius: 6px; background: #4A4A4A; color: #fff; padding: 7px 11px; 
    font-weight: 700; cursor: pointer; 
}

/* 5. Cải tiến layout hàng dọc (trên - dưới) cho các slide thuần văn bản/không có ảnh */
.rows-layout {
    display: grid !important;
    grid-template-columns: 1fr !important; /* Trải dài full hàng ngang */
    gap: 20px !important;
    margin-top: 20px !important;
}

/* 6. Layout lưới cân bằng 2 cột bằng nhau cho slide Danh mục thiết bị */
.grid-2col {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 30px !important;
    margin-top: 20px !important;
}

/* ==========================================================================
   HỖ TRỢ MOBILE & MÀN HÌNH NHỎ (RESPONSIVE)
   ========================================================================== */
@media (max-width: 900px), (max-height: 700px){
  body, html { background: #111; width: 100%; height: 100%; overscroll-behavior: none; }
  .slider-container { width: 100vw; max-width: none; height: 100dvh; margin: 0; border-radius: 0; box-shadow: none; }
  .header { height: 64px; padding: 8px 14px; border-bottom-width: 3px; }
  .header h1 { font-size: 12px; line-height: 1.2; max-width: 72%; }
  .logo-container img { height: 38px; max-width: 120px; }
  .slides-wrapper { height: calc(100% - 99px); }
  .slide { padding: 18px 18px 100px; }
  h2 { font-size: 22px; } h3 { font-size: 18px; } p, li { font-size: 14px; line-height: 1.45; }
  
  /* Chuyển thành 1 cột đứng trên Mobile */
  .equipment-grid, .grid-2col { grid-template-columns: 1fr !important; gap: 14px !important; }
  .product-visual { width: 100% !important; height: 180px !important; }
  .product-visual img { max-height: 160px !important; }
  
  .flow-container { margin-top: 18px; padding: 12px; justify-content: center; }
  .flow-box { width: 125px; padding: 10px; } .flow-arrow { font-size: 20px; }
  .specs-table { display: block; overflow-x: auto; white-space: normal; }
  .specs-table th, .specs-table td { font-size: 12px; padding: 7px; }
  .controls { bottom: 42px; right: 12px; left: 12px; justify-content: space-between; }
  .btn { padding: 9px 14px; font-size: 13px; }
  .footer { height: 35px; padding: 0 12px; font-size: 10px; }
  .footer div:first-child { max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .v2-fullscreen { top: 70px; right: 10px; font-size: 11px; padding: 6px 9px; }
}
</style>

    // 2. Bộ lọc ép trình duyệt phải đọc theo chuẩn UTF-8 để cứu tiếng Việt và Icon
    function decodeVietnameseB64(b64Str) {
        const binaryString = atob(b64Str);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return new TextDecoder('utf-8').decode(bytes);
    }

    // 3. Phun code sạch ra màn hình
    document.write(decodeVietnameseB64(encryptedData));

    </div>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    document.getElementById('total-pages').innerText = slides.length;
    
    function showSlide(index) {
        slides.forEach(slide => slide.classList.remove('active'));
        slides[index].classList.add('active');
        document.getElementById('page-num').innerText = index + 1;
        slides[index].scrollTop = 0;
    }
    
    function nextSlide() {
        if(currentSlide < slides.length - 1) {
            currentSlide++;
            showSlide(currentSlide);
        }
    }
    
    function prevSlide() {
        if(currentSlide > 0) {
            currentSlide--;
            showSlide(currentSlide);
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "ArrowRight") {
            nextSlide();
        } else if (event.key === "ArrowLeft") {
            prevSlide();
        }
    });

    document.querySelectorAll('.flow-box, .flow-node').forEach(box => {
        box.addEventListener('click', () => {
            box.classList.remove('clicked-bounce');
            void box.offsetWidth; 
            box.classList.add('clicked-bounce');
        });
        box.addEventListener('animationend', () => {
            box.classList.remove('clicked-bounce');
        });
    });
</script>

<script id="v2-interactions">
let touchStartX=0,touchStartY=0,touchEndX=0,touchEndY=0;
const swipeArea=document.querySelector('.slides-wrapper');
swipeArea.addEventListener('touchstart',e=>{const t=e.changedTouches[0];touchStartX=t.screenX;touchStartY=t.screenY;},{passive:true});
swipeArea.addEventListener('touchend',e=>{const t=e.changedTouches[0];touchEndX=t.screenX;touchEndY=t.screenY;
 const dx=touchEndX-touchStartX,dy=touchEndY-touchStartY;
 if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.3){dx<0?nextSlide():prevSlide();}
},{passive:true});
function toggleFullscreen(){
 const el=document.querySelector('.slider-container');
 if(!document.fullscreenElement && !document.webkitFullscreenElement){
   (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
 }else{
   (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
 }
}
</script>

    <script>
        // 1. Chặn menu chuột phải
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Chặn các phím tắt phổ biến để soi code
        document.onkeydown = function(e) {
            // Chặn F12 (123)
            if (e.keyCode == 123) return false;
            
            // Chặn Ctrl + Shift + I (Mở DevTools)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
            
            // Chặn Ctrl + Shift + J (Mở Console)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
            
            // Chặn Ctrl + U (Xem Source code gốc)
            if (e.ctrlKey && e.keyCode == 85) return false;
            
            // Chặn Ctrl + S (Chặn lưu file về máy)
            if (e.ctrlKey && e.keyCode == 83) return false;
        };

        // 3. Chặn kéo thả bôi đen văn bản để copy
        document.addEventListener('selectstart', e => e.preventDefault());
</script>
